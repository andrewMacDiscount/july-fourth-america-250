<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>250 Celebration RSVP - July 4th, 2026</title>

  <!-- Open Graph meta tags for link previews -->
  <meta property="og:title" content="250 Celebration - July 4th, 2026">
  <meta property="og:description" content="You're invited! Food, Private Bartender, Swimming, Games and Fireworks. 5pm at the Stewarts House.">
  <meta property="og:image" content="https://andrewmacdiscount.github.io/july-fourth-america-250/image0.jpeg">
  <meta property="og:type" content="website">

  <!-- Twitter/iMessage card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="250 Celebration - July 4th, 2026">
  <meta name="twitter:description" content="You're invited! Food, Private Bartender, Swimming, Games and Fireworks. 5pm at the Stewarts House.">
  <meta name="twitter:image" content="https://andrewmacdiscount.github.io/july-fourth-america-250/image0.jpeg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #1a1a6e 0%, #2c3e8c 30%, #c0392b 70%, #f5f5f5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .invitation-image {
      max-width: 480px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 2rem;
    }

    .rsvp-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .rsvp-card h2 {
      font-size: 1.5rem;
      color: #1a1a6e;
      margin-bottom: 0.5rem;
    }

    .rsvp-card p.subtitle {
      color: #555;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    form {
      text-align: left;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #333;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #1a1a6e;
    }

    .btn-group {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    button {
      flex: 1;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-accept {
      background: #3C3B6E;
      color: white;
    }

    .btn-accept:hover {
      opacity: 0.9;
    }

    .btn-decline {
      background: #c0392b;
      color: white;
    }

    .btn-decline:hover {
      opacity: 0.9;
    }

    .confirmation {
      display: none;
      margin-top: 1.5rem;
      padding: 1.5rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .confirmation.accepted {
      background: #d4edda;
      color: #155724;
    }

    .confirmation.declined {
      background: #f8d7da;
      color: #721c24;
    }

    #rsvp-form.hidden {
      display: none;
    }

    .guest-list-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      margin-top: 2rem;
      text-align: center;
    }

    .guest-list-card h2 {
      font-size: 1.5rem;
      color: #1a1a6e;
      margin-bottom: 0.25rem;
    }

    .guest-list-card .total {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    .guest-list {
      list-style: none;
      text-align: left;
    }

    .guest-list li {
      padding: 0.6rem 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #333;
    }

    .guest-list li:last-child {
      border-bottom: none;
    }

    .guest-list .guest-count {
      background: #3C3B6E;
      color: white;
      border-radius: 12px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .guest-list-loading {
      color: #888;
      font-style: italic;
    }

    /* Admin Mode */
    .admin-panel {
      display: none;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      margin-top: 2rem;
      text-align: center;
      border: 3px solid #gold;
      border-color: #d4af37;
    }

    .admin-panel.visible {
      display: block;
    }

    .admin-panel h2 {
      font-size: 1.5rem;
      color: #d4af37;
      margin-bottom: 0.25rem;
    }

    .admin-panel .admin-subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .admin-section-title {
      font-weight: 700;
      color: #1a1a6e;
      margin: 1.25rem 0 0.5rem;
      text-align: left;
      font-size: 0.95rem;
    }

    .admin-list {
      list-style: none;
      text-align: left;
    }

    .admin-list li {
      padding: 0.75rem 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #333;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .admin-list li:last-child {
      border-bottom: none;
    }

    .admin-list .admin-actions {
      display: flex;
      gap: 0.4rem;
    }

    .admin-list .admin-actions button {
      flex: none;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      border-radius: 6px;
    }

    .btn-edit {
      background: #3C3B6E;
      color: white;
    }

    .btn-delete {
      background: #c0392b;
      color: white;
    }

    .declined-badge {
      background: #c0392b;
      color: white;
      border-radius: 12px;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .admin-close-btn {
      margin-top: 1.5rem;
      background: #666;
      color: white;
      padding: 0.6rem 1.5rem;
      flex: none;
    }
  </style>
</head>
<body>
  <img
    src="image0.jpeg"
    alt="250 Celebration - Please join us for our 250th celebration. Food, Private Bartender, Swimming, Games and Fireworks. 4 July 2026, 5pm to Late. The Stewarts House, 672 Valencia Road, Mars, PA 16046. Bring the whole family, a snack and towels for the kids!"
    class="invitation-image"
  >

  <div class="rsvp-card">
    <h2>RSVP</h2>
    <p class="subtitle">Let us know if you can make it!</p>

    <form id="rsvp-form" aria-label="RSVP Form">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required placeholder="Enter your name">

      <label for="guests">Number of Guests (including you)</label>
      <input type="number" id="guests" name="guests" min="1" max="20" value="1">

      <div class="btn-group">
        <button type="button" class="btn-accept" onclick="submitRSVP('accepted')">Count Me In! 🎉</button>
        <button type="button" class="btn-decline" onclick="submitRSVP('declined')">Can't Make It</button>
      </div>
    </form>

    <div class="confirmation" id="confirmation" role="alert"></div>
  </div>

  <div class="guest-list-card">
    <h2>Who's Coming 🎊</h2>
    <p class="total" id="total-guests"></p>
    <ul class="guest-list" id="guest-list">
      <li class="guest-list-loading">Loading...</li>
    </ul>
  </div>

  <!-- Admin Panel (hidden until triple-click) -->
  <div class="admin-panel" id="admin-panel">
    <h2>🔑 Admin Mode</h2>
    <p class="admin-subtitle">Triple-click "RSVP" again to hide</p>

    <p class="admin-section-title">✅ Accepted</p>
    <ul class="admin-list" id="admin-accepted-list"></ul>

    <p class="admin-section-title">❌ Declined</p>
    <ul class="admin-list" id="admin-declined-list"></ul>

    <button class="admin-close-btn" onclick="toggleAdmin()">Close Admin</button>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    // Initialize Firebase
    firebase.initializeApp({
      apiKey: "AIzaSyA04na58GLl0agrMw_EGj3N4zTxnyoGZoo",
      authDomain: "julyfourth250.firebaseapp.com",
      projectId: "julyfourth250",
      storageBucket: "julyfourth250.firebasestorage.app",
      messagingSenderId: "155643186377",
      appId: "1:155643186377:web:48b08a54701582d83f5118"
    });

    const db = firebase.firestore();

    function submitRSVP(response) {
      const name = document.getElementById('name').value.trim();
      if (!name) {
        document.getElementById('name').focus();
        return;
      }

      const guests = parseInt(document.getElementById('guests').value);
      const form = document.getElementById('rsvp-form');
      const confirmation = document.getElementById('confirmation');

      // Disable buttons while saving
      form.querySelectorAll('button').forEach(btn => btn.disabled = true);

      db.collection('rsvps').add({
        name: name,
        guests: guests,
        response: response,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
        form.classList.add('hidden');
        confirmation.style.display = 'block';

        if (response === 'accepted') {
          confirmation.className = 'confirmation accepted';
          confirmation.textContent = `🎉 Thanks, ${name}! You're confirmed for ${guests} guest${guests > 1 ? 's' : ''}. See you on the 4th!`;
          loadGuestList();
        } else {
          confirmation.className = 'confirmation declined';
          confirmation.textContent = `We'll miss you, ${name}! Hope to see you next time. 🙁`;
        }
      })
      .catch((error) => {
        console.error('Error saving RSVP:', error);
        form.querySelectorAll('button').forEach(btn => btn.disabled = false);
        alert('Something went wrong. Please try again!');
      });
    }

    // Load accepted RSVPs
    function loadGuestList() {
      db.collection('rsvps')
        .get()
        .then((snapshot) => {
          const list = document.getElementById('guest-list');
          const totalEl = document.getElementById('total-guests');
          list.innerHTML = '';

          let totalGuests = 0;
          const accepted = [];

          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.response === 'accepted') {
              accepted.push(data);
              totalGuests += data.guests;
            }
          });

          if (accepted.length === 0) {
            list.innerHTML = '<li class="guest-list-loading">No RSVPs yet — be the first!</li>';
            totalEl.textContent = '';
            return;
          }

          accepted.forEach((data) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${data.name}</span><span class="guest-count">${data.guests} guest${data.guests > 1 ? 's' : ''}</span>`;
            list.appendChild(li);
          });

          totalEl.textContent = `${totalGuests} total guest${totalGuests !== 1 ? 's' : ''} confirmed`;
        })
        .catch((error) => {
          console.error('Error loading guest list:', error);
          document.getElementById('guest-list').innerHTML = '<li class="guest-list-loading">Could not load guest list</li>';
        });
    }

    loadGuestList();

    // --- Admin Mode (triple-click easter egg) ---
    let adminMode = false;

    document.querySelector('.rsvp-card h2').addEventListener('click', function (e) {
      if (e.detail === 3) {
        toggleAdmin();
      }
    });

    function toggleAdmin() {
      adminMode = !adminMode;
      const panel = document.getElementById('admin-panel');
      if (adminMode) {
        panel.classList.add('visible');
        loadAdminList();
      } else {
        panel.classList.remove('visible');
      }
    }

    function loadAdminList() {
      db.collection('rsvps').get().then((snapshot) => {
        const acceptedList = document.getElementById('admin-accepted-list');
        const declinedList = document.getElementById('admin-declined-list');
        acceptedList.innerHTML = '';
        declinedList.innerHTML = '';

        const accepted = [];
        const declined = [];

        snapshot.forEach((doc) => {
          const data = doc.data();
          data._id = doc.id;
          if (data.response === 'accepted') {
            accepted.push(data);
          } else {
            declined.push(data);
          }
        });

        if (accepted.length === 0) {
          acceptedList.innerHTML = '<li style="color:#888;font-style:italic;">None yet</li>';
        } else {
          accepted.forEach((data) => {
            acceptedList.appendChild(createAdminRow(data));
          });
        }

        if (declined.length === 0) {
          declinedList.innerHTML = '<li style="color:#888;font-style:italic;">None yet</li>';
        } else {
          declined.forEach((data) => {
            declinedList.appendChild(createAdminRow(data));
          });
        }
      });
    }

    function createAdminRow(data) {
      const li = document.createElement('li');
      const info = document.createElement('span');
      info.textContent = `${data.name} (${data.guests})`;

      const actions = document.createElement('span');
      actions.className = 'admin-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'btn-edit';
      editBtn.textContent = 'Edit';
      editBtn.onclick = () => editRSVP(data);

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn-delete';
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = () => deleteRSVP(data._id);

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);

      li.appendChild(info);
      li.appendChild(actions);
      return li;
    }

    function editRSVP(data) {
      const newName = prompt('Name:', data.name);
      if (newName === null) return;

      const newGuests = prompt('Number of guests:', data.guests);
      if (newGuests === null) return;

      const newResponse = prompt('Response (accepted/declined):', data.response);
      if (newResponse === null) return;
      if (newResponse !== 'accepted' && newResponse !== 'declined') {
        alert('Response must be "accepted" or "declined"');
        return;
      }

      db.collection('rsvps').doc(data._id).update({
        name: newName.trim(),
        guests: parseInt(newGuests),
        response: newResponse
      }).then(() => {
        loadAdminList();
        loadGuestList();
      }).catch((err) => {
        console.error(err);
        alert('Error updating RSVP');
      });
    }

    function deleteRSVP(id) {
      if (!confirm('Are you sure you want to delete this RSVP?')) return;

      db.collection('rsvps').doc(id).delete().then(() => {
        loadAdminList();
        loadGuestList();
      }).catch((err) => {
        console.error(err);
        alert('Error deleting RSVP');
      });
    }
  </script>
</body>
</html>
